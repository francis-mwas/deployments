apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pesaloop-dev

resources:
  - ../../base/backend

images:
  - name: ghcr.io/francis-mwas/pesaloop-backend
    newTag: dev-latest

patches:
  # 1 replica in dev
  - target:
      kind: Deployment
      name: pesaloop-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Recreate strategy — kill old pod before starting new one
  - target:
      kind: Deployment
      name: pesaloop-backend
    patch: |
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate

  # Smaller resources for dev
  - target:
      kind: Deployment
      name: pesaloop-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "250m"

  # Longer startup probe — Spring Boot slow on limited CPU
  - target:
      kind: Deployment
      name: pesaloop-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/startupProbe
        value:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5

configMapGenerator:
  - name: pesaloop-backend-config
    behavior: merge
    literals:
      - LOGGING_LEVEL_COM_PESALOOP=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
      - PESALOOP_JWT_EXPIRY_HOURS=72
      - PESALOOP_MPESA_ENVIRONMENT=sandbox
      - PESALOOP_MPESA_BASE_URL=https://sandbox.safaricom.co.ke
      - PESALOOP_SMS_USERNAME=sandbox
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
      - SPRING_DATASOURCE_USERNAME=postgres.qnbdgpoueacdqkxjebbe
